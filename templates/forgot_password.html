{% extends 'auth_base.html' %}

{% block title %}忘記密碼 - 二手書平台{% endblock %}

{% block content %}
<div class="main-content">
    <div class="auth-container">
        <!-- 標題和返回按鈕 -->
        <div class="page-header">
            <a href="/login" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h2 class="page-title">忘記密碼</h2>
        </div>

        <!-- 錯誤訊息 -->
        {% if error %}
        <div class="alert alert-danger" role="alert">
            <i class="fas fa-exclamation-circle"></i>
            {{ error }}
        </div>
        {% endif %}

        <!-- 成功訊息 -->
        {% if success %}
        <div class="alert alert-success" role="alert">
            <i class="fas fa-check-circle"></i>
            密碼重設郵件已發送至您的電子郵件，請檢查您的收件箱並按照指示重設密碼。
        </div>
        {% endif %}

        <div class="forgot-password-info">
            <p>請輸入您的臺科大學號，我們將發送密碼重設連結至您的學校電子郵件。</p>
        </div>

        <form method="POST" action="/forgot_password" id="forgotPasswordForm">
            <div class="form-section">
                <div class="form-group">
                    <label for="std_num">臺科大學號:</label>
                    <input type="text" class="form-control" id="std_num" name="std_num" placeholder="請輸入學號" required autofocus>
                </div>
            </div>

            <!-- 提交按鈕 -->
            <div class="form-submit">
                <button type="submit" class="submit-btn">發送重設郵件</button>
            </div>
        </form>

        <!-- 返回登入連結 -->
        <div class="auth-link">
            <p>記起密碼了？ <a href="/login">返回登入</a></p>
        </div>
    </div>
</div>
{% endblock %}
