{% extends 'base.html' %}

{% block title %}編輯個人資訊 - 二手書平台{% endblock %}

{% block content %}
<div class="main-content">
    <!-- 標題和返回按鈕 -->
    <div class="page-header">
        <a href="/profile" class="back-btn">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h2 class="page-title">編輯個人資訊</h2>
    </div>

    <!-- 錯誤訊息 -->
    {% if error %}
    <div class="alert alert-danger" role="alert">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/edit_profile">
        <div class="form-section">
            <!-- 頭像選擇 -->
            <div class="form-group">
                <label>頭像:</label>
                <div class="avatar-selection-container">
                    <div class="avatar-preview-large">
                        <img src="{{ url_for('static', filename='images/' + (user_avatar if user_avatar else 'user_cat01.png')) }}" alt="頭像預覽" class="avatar-preview" id="avatarPreview">
                    </div>
                    <div class="avatar-options">
                        <label class="avatar-option">
                            <input type="radio" name="avatar" value="user_cat01.png" {{ 'checked' if (user_avatar == 'user_cat01.png' or not user_avatar) else '' }}>
                            <img src="{{ url_for('static', filename='images/user_cat01.png') }}" alt="頭像1" class="avatar-thumbnail">
                        </label>
                        <label class="avatar-option">
                            <input type="radio" name="avatar" value="user_cat02.png" {{ 'checked' if user_avatar == 'user_cat02.png' else '' }}>
                            <img src="{{ url_for('static', filename='images/user_cat02.png') }}" alt="頭像2" class="avatar-thumbnail">
                        </label>
                        <label class="avatar-option">
                            <input type="radio" name="avatar" value="user_female.png" {{ 'checked' if user_avatar == 'user_female.png' else '' }}>
                            <img src="{{ url_for('static', filename='images/user_female.png') }}" alt="頭像3" class="avatar-thumbnail">
                        </label>
                        <label class="avatar-option">
                            <input type="radio" name="avatar" value="user_male.png" {{ 'checked' if user_avatar == 'user_male.png' else '' }}>
                            <img src="{{ url_for('static', filename='images/user_male.png') }}" alt="頭像4" class="avatar-thumbnail">
                        </label>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="display_name">顯示名稱:</label>
                <input type="text" class="form-control" id="display_name" name="display_name" value="{{ user_display }}" placeholder="請輸入顯示名稱">
            </div>
            
            <div class="form-group">
                <label>電子郵件:</label>
                <input type="email" class="form-control" value="{{ user_email }}" disabled>
                <small class="form-text">電子郵件無法修改</small>
            </div>
        </div>

        <!-- 提交按鈕 -->
        <div class="form-submit">
            <button type="submit" class="submit-btn">儲存變更</button>
        </div>
    </form>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const avatarInputs = document.querySelectorAll('input[name="avatar"]');
    const preview = document.getElementById('avatarPreview');
    const basePath = '{{ url_for("static", filename="images/") }}';
    
    avatarInputs.forEach(input => {
        input.addEventListener('change', function() {
            if (this.checked) {
                preview.src = basePath + this.value;
                // 更新選中狀態的視覺效果
                document.querySelectorAll('.avatar-option').forEach(option => {
                    option.style.borderColor = 'transparent';
                });
                this.closest('.avatar-option').style.borderColor = '#8B7355';
            }
        });
        
        // 初始化選中狀態
        if (input.checked) {
            input.closest('.avatar-option').style.borderColor = '#8B7355';
        }
    });
});
</script>
{% endblock %}
