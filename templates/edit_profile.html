{% extends 'base.html' %}

{% block title %}編輯個人資訊 - 二手書平台{% endblock %}

{% block content %}
<div class="main-content">
    <!-- 標題和返回按鈕 -->
    <div class="page-header">
        <a href="/profile" class="back-btn">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h2 class="page-title">編輯個人資訊</h2>
    </div>

    <!-- 錯誤訊息 -->
    {% if error %}
    <div class="alert alert-danger" role="alert">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/edit_profile" enctype="multipart/form-data">
        <div class="form-section">
            <!-- 頭像上傳 -->
            <div class="form-group">
                <label>頭像:</label>
                <div class="avatar-upload-container">
                    <img src="{{ url_for('static', filename='images/user_cat01.png') }}" alt="頭像" class="avatar-preview" id="avatarPreview">
                    <label for="avatar" class="avatar-upload-btn">
                        <i class="fas fa-camera"></i>
                        <span>更換頭像</span>
                    </label>
                    <input type="file" id="avatar" name="avatar" accept="image/*" class="image-input" onchange="previewAvatar(this)">
                </div>
            </div>
            
            <div class="form-group">
                <label for="display_name">顯示名稱:</label>
                <input type="text" class="form-control" id="display_name" name="display_name" value="{{ user_display }}" placeholder="請輸入顯示名稱">
            </div>
            
            <div class="form-group">
                <label>電子郵件:</label>
                <input type="email" class="form-control" value="{{ user_email }}" disabled>
                <small class="form-text">電子郵件無法修改</small>
            </div>
        </div>

        <!-- 提交按鈕 -->
        <div class="form-submit">
            <button type="submit" class="submit-btn">儲存變更</button>
        </div>
    </form>
</div>

<script>
function previewAvatar(input) {
    const preview = document.getElementById('avatarPreview');
    const file = input.files[0];
    
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            preview.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }
}
</script>
{% endblock %}
