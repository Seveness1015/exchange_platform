{% extends 'base.html' %}

{% block title %}修改密碼 - 二手書平台{% endblock %}

{% block content %}
<div class="main-content">
    <!-- 標題和返回按鈕 -->
    <div class="page-header">
        <a href="/profile" class="back-btn">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h2 class="page-title">修改密碼</h2>
    </div>

    <!-- 錯誤訊息 -->
    {% if error %}
    <div class="alert alert-danger" role="alert">
        {{ error }}
    </div>
    {% endif %}

    <!-- 成功訊息 -->
    {% if request.args.get('success') == 'password_changed' %}
    <div class="alert alert-success" role="alert" id="successMessage">
        <i class="fas fa-check-circle"></i>
        密碼已成功修改！
    </div>
    {% endif %}

    <form method="POST" action="/change_password" id="changePasswordForm">
        <div class="form-section">
            <div class="form-group">
                <label for="current_password">目前密碼:</label>
                <input type="password" class="form-control" id="current_password" name="current_password" required>
                <div id="same-password-error" class="error-text"></div>
            </div>
            
            <div class="form-group">
                <label for="new_password">新密碼:</label>
                <input type="password" class="form-control" id="new_password" name="new_password" required minlength="6">
                <small class="form-text" id="password-hint">密碼長度至少6位，至少包含一個大寫字母和一個小寫字母，且不能與目前密碼相同</small>
                <div id="password-error" class="error-text"></div>
            </div>
            
            <div class="form-group">
                <label for="confirm_password">確認新密碼:</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required minlength="6">
                <div id="password-match-error" class="error-text"></div>
            </div>
        </div>

        <!-- 提交按鈕 -->
        <div class="form-submit">
            <button type="submit" class="submit-btn">修改密碼</button>
        </div>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const currentPasswordInput = document.getElementById('current_password');
    const passwordInput = document.getElementById('new_password');
    const passwordCheckInput = document.getElementById('confirm_password');
    const passwordError = document.getElementById('password-error');
    const passwordMatchError = document.getElementById('password-match-error');
    const samePasswordError = document.getElementById('same-password-error');
    const submitBtn = document.querySelector('.submit-btn');
    
    // 顯示成功訊息彈窗
    const successMessage = document.getElementById('successMessage');
    if (successMessage) {
        // 3秒後自動關閉成功訊息，並可選擇跳轉到個人資料頁面
        setTimeout(function() {
            successMessage.style.opacity = '0';
            successMessage.style.transition = 'opacity 0.5s';
            setTimeout(function() {
                // 可選：自動跳轉到個人資料頁面
                // window.location.href = '/profile';
            }, 500);
        }, 3000);
    }
    
    function validatePassword() {
        const password = passwordInput.value;
        const errors = [];
        
        if (password.length < 6) {
            errors.push('密碼長度至少6位');
        }
        if (!/[A-Z]/.test(password)) {
            errors.push('至少包含一個大寫字母');
        }
        if (!/[a-z]/.test(password)) {
            errors.push('至少包含一個小寫字母');
        }
        
        if (errors.length > 0) {
            passwordError.textContent = errors.join('，');
            passwordError.style.display = 'block';
            return false;
        } else {
            passwordError.textContent = '';
            passwordError.style.display = 'none';
            return true;
        }
    }
    
    function checkPasswordMatch() {
        if (passwordInput.value !== passwordCheckInput.value) {
            passwordMatchError.textContent = '兩次輸入的密碼不一致';
            passwordMatchError.style.display = 'block';
            return false;
        } else {
            passwordMatchError.textContent = '';
            passwordMatchError.style.display = 'none';
            return true;
        }
    }
    
    function checkSamePassword() {
        const currentPassword = currentPasswordInput.value;
        const newPassword = passwordInput.value;
        
        if (currentPassword && newPassword && currentPassword === newPassword) {
            samePasswordError.textContent = '新密碼與目前密碼相同，請使用不同的密碼';
            samePasswordError.style.display = 'block';
            return false;
        } else {
            samePasswordError.textContent = '';
            samePasswordError.style.display = 'none';
            return true;
        }
    }
    
    function validateForm() {
        const isPasswordValid = validatePassword();
        const isMatch = checkPasswordMatch();
        const isNotSame = checkSamePassword();
        
        // 只有當兩個密碼欄位都有值時才檢查匹配
        if (passwordCheckInput.value && !isMatch) {
            return false;
        }
        
        // 檢查新舊密碼是否相同
        if (!isNotSame) {
            return false;
        }
        
        return isPasswordValid;
    }
    
    // 監聽目前密碼輸入
    currentPasswordInput.addEventListener('input', function() {
        if (passwordInput.value) {
            checkSamePassword();
        }
    });
    
    // 監聽新密碼輸入
    passwordInput.addEventListener('input', function() {
        validatePassword();
        checkSamePassword();
        if (passwordCheckInput.value) {
            checkPasswordMatch();
        }
    });
    
    // 監聽確認密碼輸入
    passwordCheckInput.addEventListener('input', function() {
        if (passwordInput.value) {
            checkPasswordMatch();
        }
    });
    
    // 表單提交驗證
    document.getElementById('changePasswordForm').addEventListener('submit', function(e) {
        const currentPassword = currentPasswordInput.value;
        const newPassword = passwordInput.value;
        const confirmPassword = passwordCheckInput.value;
        
        // 驗證新舊密碼是否相同
        if (currentPassword && newPassword && currentPassword === newPassword) {
            e.preventDefault();
            samePasswordError.textContent = '新密碼與目前密碼相同，請使用不同的密碼';
            samePasswordError.style.display = 'block';
            return false;
        }
        
        // 驗證密碼規則
        if (!validatePassword()) {
            e.preventDefault();
            return false;
        }
        
        // 驗證密碼匹配
        if (newPassword !== confirmPassword) {
            e.preventDefault();
            passwordMatchError.textContent = '兩次輸入的密碼不一致';
            passwordMatchError.style.display = 'block';
            return false;
        }
        
        return true;
    });
});
</script>
{% endblock %}
