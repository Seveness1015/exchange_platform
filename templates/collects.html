<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        /* 浮動按鈕樣式 */
        .floating-btn {
            position: fixed;
            left: 0px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1050;
            background-color: #005BAA;
            color: #fff;
            border: none;
            border-radius: 0% 50% 50% 0%;
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            font-size: 24px;
            transition: left 0.3s ease-in-out, background-color 0.3s ease-in-out;
        }

        .floating-btn.hide-btn {
            left: -50px;
        }

        .floating-btn:hover {
            background-color: #0D315A;
            cursor: pointer;
        }

        .floating-btn i {
            color: #fff;
        }

        /* 圓形頭貼樣式 */
        .profile-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
        }

        .offcanvas-body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        
    </style>
</head>
<body>

    <!-- 浮動按鈕 -->
    <button class="btn floating-btn" type="button" id="toggleButton" data-bs-toggle="offcanvas" data-bs-target="#offcanvasLeft" aria-controls="offcanvasLeft">
        <i class="fas fa-arrow-right"></i> <!-- 使用 Font Awesome 圖示 -->
    </button>

    <!-- Offcanvas 左側顯示 -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasLeft" aria-labelledby="offcanvasLeftLabel">
        <div class="offcanvas-header">
            <h5 id="offcanvasLeftLabel">帳號資訊</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <p>帳號資訊之類的之後會再放。</p>
        </div>
    </div>

    <!-- 主體內容 -->
    <div class="container text-center mt-5">
            <h2>收藏項目</h2>
            <div id="favorite-list"></div>
    
        <script>
            $(document).ready(function () {
                function loadFavorites() {
                    $.get("/favorites", function (data) {
                        $("#favorite-list").empty();
                        data.forEach(item => {
                            $("#favorite-list").append(`
                                <div class="item" data-id="${item.id}">
                                    <img src="${item.image_url}" alt="封面">
                                    <div class="item-name">${item.name}</div>
                                    <button class="favorite-btn">❤️</button>
                                </div>
                            `);
                        });
                    });
                }
    
                $("#favorite-list").on("click", ".favorite-btn", function () {
                    let itemId = $(this).closest(".item").data("id");
                    $.ajax({
                        url: `/favorites/${itemId}`,
                        type: "DELETE",
                        success: function () {
                            loadFavorites();
                        }
                    });
                });
    
                loadFavorites();
            });
        </script>
    </div>

    <!-- Bootstrap JS (Optional) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // 監聽 Offcanvas 開啟與關閉事件
        var offcanvasElement = document.getElementById('offcanvasLeft');
        var toggleButton = document.getElementById('toggleButton');

        offcanvasElement.addEventListener('show.bs.offcanvas', function () {
            // Offcanvas 開啟時，讓按鈕向左滑出並隱藏
            toggleButton.classList.add('hide-btn');
        });

        offcanvasElement.addEventListener('hidden.bs.offcanvas', function () {
            // Offcanvas 關閉時，讓按鈕向右滑出並顯示
            toggleButton.classList.remove('hide-btn');
        });
    </script>

</body>
</html>
