<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二手書平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        /* 浮動按鈕樣式 */
        .floating-btn {
            position: fixed;
            left: 0px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1050;
            background-color: #005BAA; /* 自定義背景顏色 */
            color: #fff; /* 按鈕文字顏色 */
            border: none;
            border-radius: 0% 50% 50% 0%; /* 圓形按鈕 */
            padding: 15px; /* 增加按鈕大小 */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); /* 添加陰影 */
            font-size: 24px; /* 調整文字大小 */
            transition: left 0.3s ease-in-out, background-color 0.3s ease-in-out; /* 平滑過渡動畫 */
        }

        /* 當Offcanvas開啟時，按鈕向左滑出 */
        .floating-btn.hide-btn {
            left: -50px;
        }

        .floating-btn:hover {
            background-color: #0D315A; /* 按鈕懸浮效果 */
            cursor: pointer;
        }

        .floating-btn i {
            color: #fff; /* 確保圖示顏色始終為白色 */
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">二手書平台</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link active" href="#">首頁</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">關於我們</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">聯絡我們</a>
        </li>
        <li class="nav-item">
            <a class="btn btn-outline-light" href="/logout" role="button">登出</a>
          </li>
      </ul>
    </div>
  </div>
</nav>

<!-- 浮動按鈕 -->
<button class="btn floating-btn" type="button" id="toggleButton" data-bs-toggle="offcanvas" data-bs-target="#offcanvasLeft" aria-controls="offcanvasLeft">
    <i class="fas fa-arrow-right"></i> <!-- 使用 Font Awesome 圖示 -->
</button>

<!-- Offcanvas 左側顯示 -->
<div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasLeft" aria-labelledby="offcanvasLeftLabel">
  <div class="offcanvas-header">
    <h5 id="offcanvasLeftLabel">帳號資訊</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <div class="offcanvas-body">
    <p>帳號資訊之類的之後會再放。</p>
  </div>
</div>

<!-- 主體內容 -->
<div class="container text-center mt-5">
    <h1>歡迎來到二手書平台</h1>
    <p>在這裡你可以交換你不再需要的書籍。</p>
</div>

<!-- Bootstrap JS (Optional) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // 監聽 Offcanvas 開啟與關閉事件
    var offcanvasElement = document.getElementById('offcanvasLeft');
    var toggleButton = document.getElementById('toggleButton');

    offcanvasElement.addEventListener('show.bs.offcanvas', function () {
        // Offcanvas 開啟時，讓按鈕向左滑出並隱藏
        toggleButton.classList.add('hide-btn');
    });

    offcanvasElement.addEventListener('hidden.bs.offcanvas', function () {
        // Offcanvas 關閉時，讓按鈕向右滑出並顯示
        toggleButton.classList.remove('hide-btn');
    });
</script>

</body>
</html>
