<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}二手書平台{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <!-- 自訂 CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    {% include 'navbar.html' %}
    {% include 'offcanva.html' %}
    {% include 'action_menu.html' %}

    {% block content %}
    {% endblock %}

    <!-- 底部導覽列 -->
    <nav class="bottom-nav">
        <div class="bottom-nav-items">
            <a href="/" class="bottom-nav-item {% if request.path == '/' %}active{% endif %}">
                <i class="fas fa-home"></i>
                <span>首頁</span>
            </a>
            <a href="/collects" class="bottom-nav-item {% if request.path == '/collects' %}active{% endif %}">
                <i class="fas fa-heart"></i>
                <span>收藏</span>
            </a>
            <a href="#" class="bottom-nav-item" onclick="event.preventDefault(); showActionMenu();">
                <i class="fas fa-plus-circle"></i>
                <span>發布</span>
            </a>
            <a href="/message" class="bottom-nav-item {% if request.path == '/message' %}active{% endif %}">
                <i class="fas fa-comment"></i>
                <span>訊息</span>
            </a>
            <a href="/profile" class="bottom-nav-item {% if request.path == '/profile' %}active{% endif %}">
                <i class="fas fa-user"></i>
                <span>個人</span>
            </a>
        </div>
    </nav>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- 自訂 JS -->
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</body>
</html>
