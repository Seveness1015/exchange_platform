<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}二手書平台{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <!-- 自訂 CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    {% include 'navbar.html' %}
    {% include 'offcanva.html' %}
    {% include 'action_menu.html' %}

    {% block content %}
    {% endblock %}

    <!-- 底部導覽列 -->
    <nav class="bottom-nav">
        <div class="bottom-nav-items">
            <a href="/" class="bottom-nav-item {% if request.path == '/' %}active{% endif %}">
                <i class="fas fa-home"></i>
                <span>首頁</span>
            </a>
            <a href="/collects" class="bottom-nav-item {% if request.path == '/collects' %}active{% endif %}">
                <i class="fas fa-heart"></i>
                <span>收藏</span>
            </a>
            <a href="#" class="bottom-nav-item" onclick="event.preventDefault(); showActionMenu();">
                <i class="fas fa-plus-circle"></i>
                <span>發布</span>
            </a>
            <a href="/message" class="bottom-nav-item {% if request.path == '/message' %}active{% endif %}" id="messageNavItem">
                <div class="bottom-nav-icon-wrapper">
                    <i class="fas fa-comment"></i>
                    <span class="bottom-nav-unread-badge" id="unreadMessageBadge" style="display: none;">0</span>
                </div>
                <span>訊息</span>
            </a>
            <a href="/profile" class="bottom-nav-item {% if request.path == '/profile' %}active{% endif %}">
                <i class="fas fa-user"></i>
                <span>個人</span>
            </a>
        </div>
    </nav>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- ZXing 條碼掃描庫 -->
    <script src="https://unpkg.com/@zxing/library@latest"></script>

    <!-- 自訂 JS -->
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
    
    <!-- ISBN 掃描功能（在 add_book 和 edit_book 頁面載入） -->
    {% if request.path == '/add_book' or '/edit_book/' in request.path %}
    <script src="{{ url_for('static', filename='js/isbn_scanner.js') }}"></script>
    {% endif %}
    
    <!-- 未讀訊息提示 -->
    <script>
    // 更新未讀訊息數量
    async function updateUnreadMessageCount() {
        try {
            const response = await fetch('/api/unread-messages/count');
            const data = await response.json();
            if (data.success) {
                const badge = document.getElementById('unreadMessageBadge');
                const unreadCount = data.unread_count || 0;
                
                if (unreadCount > 0) {
                    badge.textContent = unreadCount > 99 ? '99+' : unreadCount;
                    badge.style.display = 'flex';
                } else {
                    badge.style.display = 'none';
                }
            }
        } catch (error) {
            console.error('獲取未讀訊息數量失敗:', error);
        }
    }
    
    // 頁面載入時立即檢查
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', updateUnreadMessageCount);
    } else {
        updateUnreadMessageCount();
    }
    
    // 定期更新未讀訊息數量（每 5 秒）
    setInterval(updateUnreadMessageCount, 5000);
    
    // 當用戶點擊訊息按鈕時，延遲更新（等待頁面跳轉後）
    const messageNavItem = document.getElementById('messageNavItem');
    if (messageNavItem) {
        messageNavItem.addEventListener('click', function() {
            // 延遲更新，等待頁面跳轉並標記已讀後再更新
            setTimeout(updateUnreadMessageCount, 2000);
        });
    }
    </script>
</body>
</html>
