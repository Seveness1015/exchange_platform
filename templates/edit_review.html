{% extends 'base.html' %}

{% block title %}編輯書評 - 二手書平台{% endblock %}

{% block content %}
<div class="main-content">
    <!-- 標題和返回按鈕 -->
    <div class="page-header">
        <a href="/profile" class="back-btn">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h2 class="page-title">編輯書評</h2>
    </div>

    <!-- 錯誤訊息 -->
    {% if error %}
    <div class="alert alert-danger" role="alert">
        {{ error }}
    </div>
    {% endif %}

    <form id="editReviewForm" method="POST" action="/edit_review/{{ review.id }}">
        <!-- 書籍評價區塊 -->
        <div class="form-section">
            <h3 class="section-title">請幫助我們填寫書籍評價</h3>
            
            <div class="form-group">
                <label for="book_title">書名:</label>
                <input type="text" class="form-control" id="book_title" name="book_title" value="{{ review.book_title if review.book_title else '' }}" required>
            </div>

            <!-- 星級評分 -->
            <div class="form-group">
                <label>評分:</label>
                <div class="rating-stars">
                    <input type="radio" id="star5" name="rating" value="5" class="star-input" {% if review.rating == 5 %}checked{% endif %}>
                    <label for="star5" class="star-label"><i class="fas fa-star"></i></label>
                    <input type="radio" id="star4" name="rating" value="4" class="star-input" {% if review.rating == 4 or not review.rating %}checked{% endif %}>
                    <label for="star4" class="star-label"><i class="fas fa-star"></i></label>
                    <input type="radio" id="star3" name="rating" value="3" class="star-input" {% if review.rating == 3 %}checked{% endif %}>
                    <label for="star3" class="star-label"><i class="fas fa-star"></i></label>
                    <input type="radio" id="star2" name="rating" value="2" class="star-input" {% if review.rating == 2 %}checked{% endif %}>
                    <label for="star2" class="star-label"><i class="fas fa-star"></i></label>
                    <input type="radio" id="star1" name="rating" value="1" class="star-input" {% if review.rating == 1 %}checked{% endif %}>
                    <label for="star1" class="star-label"><i class="fas fa-star"></i></label>
                </div>
            </div>
            
            <!-- 書籍類型選擇 -->
            <div class="form-group">
                <label for="book_type">書籍類型:</label>
                <select class="form-control" id="book_type" name="book_type" required onchange="toggleBookTypeFields()">
                    <option value="">請選擇書籍類型</option>
                    <option value="extracurricular" {% if review.book_type == 'extracurricular' or not review.book_type %}selected{% endif %}>課外書</option>
                    <option value="course" {% if review.book_type == 'course' %}selected{% endif %}>課用書</option>
                </select>
            </div>
            
            
            
            <!-- 課用書相關欄位 -->
            <div id="courseBookFields" style="display: none;">
                <!-- 課程類型選擇 -->
                <div class="form-group">
                    <label for="course_type">課程類型:</label>
                    <select class="form-control" id="course_type" name="course_type" onchange="toggleCourseTypeFields()">
                        <option value="">請選擇課程類型</option>
                        <option value="general" {% if review.course_type == 'general' %}selected{% endif %}>通識課</option>
                        <option value="language" {% if review.course_type == 'language' %}selected{% endif %}>語文課</option>
                        <option value="department" {% if review.course_type == 'department' %}selected{% endif %}>系所課程</option>
                    </select>
                </div>
                
                <!-- 系所、科系、年級（僅系所課程需要） -->
                <div id="departmentFields" style="display: none;">
                    <div class="form-group">
                        <label for="department">系所:</label>
                        <select class="form-control" id="department" name="department" onchange="updateMajors()">
                            <option value="">請選擇系所</option>
                            <option value="工程學院" {% if review.department == '工程學院' %}selected{% endif %}>工程學院</option>
                            <option value="電資學院" {% if review.department == '電資學院' %}selected{% endif %}>電資學院</option>
                            <option value="管理學院" {% if review.department == '管理學院' %}selected{% endif %}>管理學院</option>
                            <option value="設計學院" {% if review.department == '設計學院' %}selected{% endif %}>設計學院</option>
                            <option value="人文社會學院" {% if review.department == '人文社會學院' %}selected{% endif %}>人文社會學院</option>
                            <option value="應用科技學院" {% if review.department == '應用科技學院' %}selected{% endif %}>應用科技學院</option>
                            <option value="產學創新學院" {% if review.department == '產學創新學院' %}selected{% endif %}>產學創新學院</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="major">科系:</label>
                        <select class="form-control" id="major" name="major">
                            <option value="">請先選擇系所</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="grade">年級:</label>
                        <select class="form-control" id="grade" name="grade">
                            <option value="">請選擇年級</option>
                            <option value="大一" {% if review.grade == '大一' %}selected{% endif %}>大一</option>
                            <option value="大二" {% if review.grade == '大二' %}selected{% endif %}>大二</option>
                            <option value="大三" {% if review.grade == '大三' %}selected{% endif %}>大三</option>
                            <option value="大四" {% if review.grade == '大四' %}selected{% endif %}>大四</option>
                            <option value="研究所" {% if review.grade == '研究所' %}selected{% endif %}>研究所</option>
                        </select>
                    </div>
                </div>
                
                <!-- 課程名稱和授課老師（所有課用書都需要） -->
                <div class="form-group">
                    <label for="course_name">課程名稱:</label>
                    <input type="text" class="form-control" id="course_name" name="course_name" value="{{ review.course_name if review.course_name else '' }}">
                </div>
                
                <div class="form-group">
                    <label for="instructor">授課老師:</label>
                    <input type="text" class="form-control" id="instructor" name="instructor" value="{{ review.instructor if review.instructor else '' }}">
                </div>
            </div>
            
            <!-- 詳細內容（所有類型都需要） -->
            <div class="form-group">
                <label for="review_content">詳細內容:</label>
                <textarea class="form-control" id="review_content" name="review_content" rows="5" placeholder="請輸入詳細內容..." required>{{ review.review_content if review.review_content else '' }}</textarea>
            </div>
        </div>

        <!-- 提交按鈕 -->
        <div class="form-submit">
            <button type="submit" class="submit-btn">更新</button>
        </div>
    </form>
</div>

<script>
// 系所與科系對應資料
const departmentMajors = {
    "工程學院": [
        "自動化及控制研究所",
        "機械工程系",
        "材料科學與工程系",
        "營建工程系",
        "化學工程系",
        "工程學士班",
        "高階科技研發碩士學位學程(EMRD在職專班)",
        "先進科技全英語學士學位學程",
        "全球發展工程學士學位學程",
        "半導體高階經營暨研發碩士在職學位學程 (SEMI-EMRD)"
    ],
    "電資學院": [
        "電子工程系",
        "電機工程系",
        "資訊工程系",
        "光電工程研究所",
        "電資學士班",
        "資通科技國際學士學位學程"
    ],
    "管理學院": [
        "管理研究所",
        "工業管理系",
        "企業管理系",
        "財務金融研究所",
        "資訊管理系",
        "管理學院MBA",
        "EMBA碩士在職專班",
        "科技管理研究所",
        "管理學士班"
    ],
    "設計學院": [
        "設計系",
        "建築系"
    ],
    "人文社會學院": [
        "數位學習與教育研究所",
        "應用外語系",
        "人文社會學科",
        "師資培育中心"
    ],
    "應用科技學院": [
        "應用科技研究所",
        "醫學工程研究所",
        "專利研究所",
        "色彩與照明科技研究所",
        "不分系學士班",
        "應用科技學士學位學程",
        "智慧財產權學士學位學程",
        "色彩影像與照明科技學士學位學程"
    ],
    "產學創新學院": [
        "智慧製造科技研究所",
        "人工智慧跨域科技研究所",
        "能源永續科技研究所",
        "先進半導體科技研究所"
    ]
};

// 根據系所更新科系選項
function updateMajors() {
    const departmentSelect = document.getElementById('department');
    const majorSelect = document.getElementById('major');
    const selectedDepartment = departmentSelect.value;
    const currentMajor = "{{ review.major if review.major else '' }}";
    
    // 清空科系選項
    majorSelect.innerHTML = '<option value="">請選擇科系</option>';
    
    // 如果有選擇系所，載入對應的科系
    if (selectedDepartment && departmentMajors[selectedDepartment]) {
        const majors = departmentMajors[selectedDepartment];
        majors.forEach(function(major) {
            const option = document.createElement('option');
            option.value = major;
            option.textContent = major;
            if (major === currentMajor) {
                option.selected = true;
            }
            majorSelect.appendChild(option);
        });
    } else {
        majorSelect.innerHTML = '<option value="">請先選擇系所</option>';
    }
}

// 切換書籍類型相關欄位
function toggleBookTypeFields() {
    const bookType = document.getElementById('book_type').value;
    const courseBookFields = document.getElementById('courseBookFields');
    
    if (bookType === 'course') {
        // 課用書：顯示課用書相關欄位
        courseBookFields.style.display = 'block';
        // 觸發課程類型欄位更新
        toggleCourseTypeFields();
    } else {
        // 課外書：隱藏課用書相關欄位
        courseBookFields.style.display = 'none';
        // 清除課用書相關欄位的必填屬性
        document.getElementById('course_type').removeAttribute('required');
        document.getElementById('course_name').removeAttribute('required');
        document.getElementById('instructor').removeAttribute('required');
        document.getElementById('department').removeAttribute('required');
        document.getElementById('major').removeAttribute('required');
        document.getElementById('grade').removeAttribute('required');
    }
}

// 切換課程類型相關欄位
function toggleCourseTypeFields() {
    const courseType = document.getElementById('course_type').value;
    const departmentFields = document.getElementById('departmentFields');
    const courseName = document.getElementById('course_name');
    const instructor = document.getElementById('instructor');
    
    if (courseType === 'department') {
        // 系所課程：顯示系所、科系、年級欄位
        departmentFields.style.display = 'block';
        document.getElementById('department').setAttribute('required', 'required');
        document.getElementById('major').setAttribute('required', 'required');
        document.getElementById('grade').setAttribute('required', 'required');
        // 更新科系選項
        updateMajors();
    } else {
        // 通識課或語文課：隱藏系所、科系、年級欄位
        departmentFields.style.display = 'none';
        document.getElementById('department').removeAttribute('required');
        document.getElementById('major').removeAttribute('required');
        document.getElementById('grade').removeAttribute('required');
    }
    
    // 所有課用書都需要課程名稱和授課老師
    if (courseType) {
        courseName.setAttribute('required', 'required');
        instructor.setAttribute('required', 'required');
    } else {
        courseName.removeAttribute('required');
        instructor.removeAttribute('required');
    }
}

// 頁面載入時初始化
document.addEventListener('DOMContentLoaded', function() {
    // 初始化書籍類型欄位顯示
    const bookType = document.getElementById('book_type').value;
    if (bookType === 'course') {
        toggleBookTypeFields();
    }
    
    // 初始化科系選項
    const departmentSelect = document.getElementById('department');
    if (departmentSelect && departmentSelect.value) {
        updateMajors();
    }
});

// 星級評分功能
document.addEventListener('DOMContentLoaded', function() {
    const starInputs = document.querySelectorAll('.star-input');
    const starLabels = document.querySelectorAll('.star-label');
    const ratingStars = document.querySelector('.rating-stars');
    
    // 獲取當前選中的評分
    const selectedRating = document.querySelector('.star-input:checked');
    const currentRating = selectedRating ? parseInt(selectedRating.value) : 4;
    updateStars(currentRating);
    
    starInputs.forEach((input, index) => {
        input.addEventListener('change', function() {
            const rating = parseInt(this.value);
            updateStars(rating);
        });
    });
    
    starLabels.forEach((label, index) => {
        label.addEventListener('mouseenter', function() {
            const rating = 5 - index;
            highlightStars(rating);
        });
    });
    
    if (ratingStars) {
        ratingStars.addEventListener('mouseleave', function() {
            const selectedInput = document.querySelector('.star-input:checked');
            if (selectedInput) {
                updateStars(parseInt(selectedInput.value));
            } else {
                updateStars(4);
            }
        });
    }
});

function updateStars(rating) {
    const starLabels = document.querySelectorAll('.star-label');
    starLabels.forEach((label, index) => {
        if ((5 - index) <= rating) {
            label.classList.add('active');
        } else {
            label.classList.remove('active');
        }
    });
}

function highlightStars(rating) {
    const starLabels = document.querySelectorAll('.star-label');
    starLabels.forEach((label, index) => {
        if ((5 - index) <= rating) {
            label.classList.add('highlight');
        } else {
            label.classList.remove('highlight');
        }
    });
}

// 表單驗證
document.getElementById('editReviewForm').addEventListener('submit', function(e) {
    const bookTitle = document.getElementById('book_title').value.trim();
    const selectedRating = document.querySelector('.star-input:checked');
    const rating = selectedRating ? selectedRating.value : '4';
    const bookType = document.getElementById('book_type').value;
    const reviewContent = document.getElementById('review_content').value.trim();
    
    // 基本驗證
    if (!bookTitle) {
        e.preventDefault();
        alert('請輸入書名');
        return false;
    }
    
    if (!bookType) {
        e.preventDefault();
        alert('請選擇書籍類型');
        return false;
    }
    
    if (!reviewContent) {
        e.preventDefault();
        alert('請輸入詳細內容');
        return false;
    }
    
    // 課用書的驗證
    if (bookType === 'course') {
        const courseType = document.getElementById('course_type').value;
        const courseName = document.getElementById('course_name').value.trim();
        const instructor = document.getElementById('instructor').value.trim();
        
        if (!courseType) {
            e.preventDefault();
            alert('請選擇課程類型');
            return false;
        }
        
        if (!courseName) {
            e.preventDefault();
            alert('請輸入課程名稱');
            return false;
        }
        
        if (!instructor) {
            e.preventDefault();
            alert('請輸入授課老師');
            return false;
        }
        
        // 系所課程需要驗證系所、科系、年級
        if (courseType === 'department') {
            const department = document.getElementById('department').value;
            const major = document.getElementById('major').value;
            const grade = document.getElementById('grade').value;
            
            if (!department) {
                e.preventDefault();
                alert('請選擇系所');
                return false;
            }
            
            if (!major || major === '請先選擇系所' || major === '請選擇科系') {
                e.preventDefault();
                alert('請選擇科系');
                return false;
            }
            
            if (!grade) {
                e.preventDefault();
                alert('請選擇年級');
                return false;
            }
            
            // 驗證科系是否屬於所選系所
            if (department && departmentMajors[department]) {
                const validMajors = departmentMajors[department];
                if (!validMajors.includes(major)) {
                    e.preventDefault();
                    alert('請選擇有效的科系');
                    return false;
                }
            }
        }
    }
    
    return true;
});
</script>
{% endblock %}
