<!-- 頂部搜尋欄 -->
<div class="top-search-bar">
  <div class="d-flex align-items-center">
    <!-- 應用程式標誌 -->
    <i class="fas fa-book-open logo-icon"></i>
    
    <!-- 搜尋容器 -->
    <div class="search-container">
      <!-- 下拉選單 -->
      <select class="search-dropdown" id="searchType">
        <option value="books">書籍</option>
        <option value="wanted">我想要書</option>
      </select>
      
      <!-- 搜尋輸入欄 -->
      <input type="text" class="search-input" id="searchInput" placeholder="要找什麼書呢？">
      
      <!-- 搜尋按鈕 -->
      <button class="search-btn" id="searchBtn" type="button">
        <i class="fas fa-search"></i>
      </button>
      
      <!-- AI 按鈕 -->
      <button class="ai-btn" id="aiBtn" type="button" title="AI 推薦">
        <i class="fas fa-robot"></i>
      </button>
    </div>
  </div>
</div>
