<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>註冊</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .register-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .form-container {
            margin-bottom: 20px;
        }
        .error-text {
            color: red;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="register-container">
    <h2 class="text-center mb-4">註冊</h2>
    
    <form action="/register" method="post">
        <!-- Std_num Field -->
        <div class="form-container">
            <label for="std_num" class="form-label">臺科大學號</label>
            <input type="std_num" name="std_num" id="std_num" class="form-control" placeholder="學號" required>
        </div>

        <!-- Password Field -->
        <div class="form-container">
            <label for="password" class="form-label">密碼</label>
            <input type="password" name="password" id="password" class="form-control" placeholder="密碼" required>
            <span id="password-error" class="error-text"></span>
        </div>

        <!-- Confirm Password Field -->
        <div class="form-container">
            <label for="password-check" class="form-label">確認密碼</label>
            <input type="password" name="password-check" id="password-check" class="form-control" placeholder="密碼" required>
            <span id="password-match-error" class="error-text"></span>
        </div>

        <!-- Submit Button -->
        <div class="d-grid gap-2">
            <button type="submit" id="submit-btn" class="btn btn-primary btn-block" disabled>註冊</button>
        </div>
    </form>

    <!-- Login Link -->
    <div class="text-center mt-3">
        <p>已經有帳號？ <a href="/login">登入</a></p>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="registErrorModal" tabindex="-1" aria-labelledby="registErrorModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="registErrorModalLabel">註冊失敗</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p>該學號已被註冊。</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
        </div>
      </div>
    </div>
</div>

<div class="modal fade" id="emailModal" tabindex="-1" aria-labelledby="emailModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="emailModalLabel">註冊成功</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p>註冊成功，請檢查您的學校電子郵件進行驗證以正式啟用帳號</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
        </div>
      </div>
    </div>
</div>  

<!-- Bootstrap JS (Optional) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {
    let passwordInput = document.getElementById("password");
    let passwordCheckInput = document.getElementById("password-check");
    let passwordError = document.getElementById("password-error");
    let passwordMatchError = document.getElementById("password-match-error");
    let submitBtn = document.getElementById("submit-btn");

    function validatePassword() {
        let password = passwordInput.value;
        let errors = [];

        if (password.length < 6) {
            errors.push("密碼長度至少6位");
        }
        if (!/[A-Z]/.test(password)) {
            errors.push("至少包含一個大寫字母");
        }
        if (!/[a-z]/.test(password)) {
            errors.push("至少包含一個小寫字母");
        }

        if (errors.length > 0) {
            passwordError.textContent = errors.join("，");
            return false;
        } else {
            passwordError.textContent = "";
            return true;
        }
    }

    function checkPasswordMatch() {
        if (passwordInput.value !== passwordCheckInput.value) {
            passwordMatchError.textContent = "兩次輸入的密碼不一致";
            return false;
        } else {
            passwordMatchError.textContent = "";
            return true;
        }
    }

    function validateForm() {
        let isPasswordValid = validatePassword();
        let isMatch = checkPasswordMatch();
        submitBtn.disabled = !(isPasswordValid && isMatch);
    }

    passwordInput.addEventListener("keyup", validateForm);
    passwordCheckInput.addEventListener("keyup", validateForm);
});

{% if error %}
    var errorModal = new bootstrap.Modal(document.getElementById('registErrorModal'));
    errorModal.show();
{% endif %}

{% if email %}
    var emailModal = new bootstrap.Modal(document.getElementById('emailModal'));
    emailModal.show();
{% endif %}
</script>

</body>
</html>
