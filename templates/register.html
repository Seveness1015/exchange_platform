<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>註冊</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .register-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .form-container {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="register-container">
    <h2 class="text-center mb-4">註冊</h2>
    
    <form action="/register" method="post">
        <!-- Email Field -->
        <div class="form-container">
            <label for="email" class="form-label">電子郵件</label>
            <input type="email" name="email" id="email" class="form-control" placeholder="Email" required>
        </div>

        <!-- Password Field -->
        <div class="form-container">
            <label for="password" class="form-label">密碼</label>
            <input type="password" name="password" id="password" class="form-control" placeholder="密碼" required>
        </div>
        <div class="form-container">
            <label for="password" class="form-label">確認密碼</label>
            <input type="password" name="password-check" id="password-check" class="form-control" placeholder="密碼" required>
        </div>

        <!-- Submit Button -->
        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary btn-block">註冊</button>
        </div>
    </form>

    <!-- Login Link -->
    <div class="text-center mt-3">
        <p>已經有帳號？ <a href="/login">登入</a></p>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="loginErrorModal" tabindex="-1" aria-labelledby="registErrorModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="registErrorModalLabel">註冊失敗</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p>該帳號已被註冊，請嘗試其他電子郵件或使用忘記密碼。</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
        </div>
      </div>
    </div>
</div>

<div class="modal fade" id="passwordErrorModal" tabindex="-1" aria-labelledby="passwordErrorModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="loginErrorModalLabel">註冊失敗</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p>密碼與確認密碼不同，請重新輸入</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
        </div>
      </div>
    </div>
</div>  

<!-- Bootstrap JS (Optional) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    {% if error %}
        var errorModal = new bootstrap.Modal(document.getElementById('registErrorModal'));
        errorModal.show();
    {% endif %}

    {% if erro_Password%}

</script>

</body>
</html>
