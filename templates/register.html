{% extends 'auth_base.html' %}

{% block title %}註冊 - 二手書平台{% endblock %}

{% block content %}
<div class="main-content">
    <div class="auth-container">
        <!-- 標題 -->
        <div class="page-header">
            <h2 class="page-title">註冊</h2>
        </div>

        <!-- 錯誤訊息 -->
        {% if error %}
        <div class="alert alert-danger" role="alert">
            <i class="fas fa-exclamation-circle"></i>
            該學號已被註冊，請使用其他學號。
        </div>
        {% endif %}

        <!-- 成功訊息 -->
        {% if email %}
        <div class="alert alert-success" role="alert">
            <i class="fas fa-check-circle"></i>
            註冊成功！請檢查您的學校電子郵件進行驗證以正式啟用帳號。
        </div>
        {% endif %}

        <form method="POST" action="/register" id="registerForm">
            <div class="form-section">
                <div class="form-group">
                    <label for="std_num">臺科大學號:</label>
                    <input type="text" class="form-control" id="std_num" name="std_num" placeholder="請輸入學號" required autofocus>
                </div>
                
                <div class="form-group">
                    <label for="password">密碼:</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="請輸入密碼" required minlength="6">
                    <small class="form-text">密碼長度至少6位，至少包含一個大寫字母和一個小寫字母</small>
                    <div id="password-error" class="error-text"></div>
                </div>
                
                <div class="form-group">
                    <label for="password-check">確認密碼:</label>
                    <input type="password" class="form-control" id="password-check" name="password-check" placeholder="請再次輸入密碼" required minlength="6">
                    <div id="password-match-error" class="error-text"></div>
                </div>
            </div>

            <!-- 提交按鈕 -->
            <div class="form-submit">
                <button type="submit" class="submit-btn" id="submit-btn" disabled>註冊</button>
            </div>
        </form>

        <!-- 登入連結 -->
        <div class="auth-link">
            <p>已經有帳號？ <a href="/login">立即登入</a></p>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const passwordInput = document.getElementById("password");
    const passwordCheckInput = document.getElementById("password-check");
    const passwordError = document.getElementById("password-error");
    const passwordMatchError = document.getElementById("password-match-error");
    const submitBtn = document.getElementById("submit-btn");

    function validatePassword() {
        const password = passwordInput.value;
        const errors = [];

        if (password.length < 6) {
            errors.push("密碼長度至少6位");
        }
        if (!/[A-Z]/.test(password)) {
            errors.push("至少包含一個大寫字母");
        }
        if (!/[a-z]/.test(password)) {
            errors.push("至少包含一個小寫字母");
        }

        if (errors.length > 0) {
            passwordError.textContent = errors.join("，");
            passwordError.style.display = 'block';
            return false;
        } else {
            passwordError.textContent = "";
            passwordError.style.display = 'none';
            return true;
        }
    }

    function checkPasswordMatch() {
        if (passwordInput.value !== passwordCheckInput.value) {
            passwordMatchError.textContent = "兩次輸入的密碼不一致";
            passwordMatchError.style.display = 'block';
            return false;
        } else {
            passwordMatchError.textContent = "";
            passwordMatchError.style.display = 'none';
            return true;
        }
    }

    function validateForm() {
        const isPasswordValid = validatePassword();
        const isMatch = checkPasswordMatch();
        submitBtn.disabled = !(isPasswordValid && isMatch);
    }

    passwordInput.addEventListener("input", validateForm);
    passwordCheckInput.addEventListener("input", validateForm);
    
    // 表單提交驗證
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        if (!validateForm() || submitBtn.disabled) {
            e.preventDefault();
            return false;
        }
        return true;
    });
});
</script>
{% endblock %}
