{% extends 'base.html' %}

{% block title %}我要換書 - 二手書平台{% endblock %}

{% block content %}
<div class="main-content">
    <!-- 標題和返回按鈕 -->
    <div class="page-header">
        <a href="/" class="back-btn">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h2 class="page-title">我要換書</h2>
    </div>

    <!-- 錯誤訊息 -->
    {% if error %}
    <div class="alert alert-danger" role="alert">
        {{ error }}
    </div>
    {% endif %}

    <form id="addBookForm" method="POST" action="/add_book" enctype="multipart/form-data">
        <!-- 書籍資訊區塊 -->
        <div class="form-section">
            <h3 class="section-title">書籍資訊</h3>
            
            <div class="form-group">
                <label for="book_title">書名:</label>
                <input type="text" class="form-control" id="book_title" name="book_title" required>
            </div>
            
            <div class="form-group">
                <label for="author">作者:</label>
                <input type="text" class="form-control" id="author" name="author" required>
            </div>
            
            <div class="form-group">
                <label for="isbn">ISBN:</label>
                <div class="isbn-input-group">
                    <input type="text" class="form-control" id="isbn" name="isbn" placeholder="將從條碼自動掃描或手動輸入">
                    <button type="button" class="scan-isbn-quick-btn" onclick="openISBNScanner()">
                        <i class="fas fa-barcode"></i>
                        <span>掃描 ISBN 快速填入</span>
                    </button>
                </div>
            </div>
            
            <div class="form-group">
                <label for="condition">書況:</label>
                <select class="form-control" id="condition" name="condition" required>
                    <option value="">請選擇書況</option>
                    <option value="近全新">近全新</option>
                    <option value="良好">良好</option>
                    <option value="普通">普通</option>
                    <option value="可接受">可接受</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="exchange_method">交換方式:</label>
                <input type="text" class="form-control" id="exchange_method" name="exchange_method" placeholder="例如：面交、郵寄等">
            </div>
            
            <div class="form-group">
                <label for="remarks">其他備註:</label>
                <textarea class="form-control" id="remarks" name="remarks" rows="3" placeholder="其他說明..."></textarea>
            </div>
            
            <!-- 圖片拍攝區域 -->
            <div class="image-upload-section">
                <label>書籍圖片（請使用相機拍攝）:</label>
                
                <!-- 相機權限提示 Modal -->
                <div class="confirm-modal-overlay" id="cameraPermissionModal">
                    <div class="confirm-modal">
                        <div class="confirm-modal-header">
                            <h4>
                                <i class="fas fa-camera" style="margin-right: 8px;"></i>
                                需要相機權限
                            </h4>
                        </div>
                        <div class="confirm-modal-body">
                            <p>為了拍攝書籍封面和封底，請授予相機使用權限</p>
                            <p style="color: var(--light-brown); font-size: 13px; margin-top: 10px;">
                                <i class="fas fa-info-circle"></i>
                                請點擊下方按鈕後，在瀏覽器彈出的權限請求中選擇「允許」
                            </p>
                        </div>
                        <div class="confirm-modal-footer">
                            <button type="button" class="confirm-btn" style="background-color: var(--light-brown); color: white;" onclick="requestCameraPermission()">
                                <i class="fas fa-check"></i>
                                授予相機權限
                            </button>
                            <button type="button" class="confirm-btn" style="background-color: #e0e0e0; color: var(--text-dark);" onclick="closeCameraPermissionModal()">
                                取消
                            </button>
                        </div>
                    </div>
                </div>
                <div class="image-upload-container">
                    <!-- 封面拍攝 -->
                    <div class="image-upload-box">
                        <div class="camera-controls">
                            <button type="button" class="camera-btn" onclick="openCamera('front')">
                                <i class="fas fa-camera"></i>
                                <span>拍攝封面</span>
                            </button>
                        </div>
                        <div id="front_camera_container" class="camera-container" style="display: none;">
                            <div style="flex: 1; overflow: hidden; border-radius: 8px 8px 0 0;">
                                <video id="front_camera" autoplay playsinline style="width: 100%; height: 100%; object-fit: contain;"></video>
                            </div>
                            <canvas id="front_canvas" style="display: none;"></canvas>
                            <div class="camera-actions">
                                <button type="button" class="capture-btn" onclick="capturePhoto('front')">
                            <i class="fas fa-camera"></i>
                                    <span>拍照</span>
                                </button>
                                <button type="button" class="cancel-btn" onclick="closeCamera('front')">
                                    <i class="fas fa-times"></i>
                                    <span>取消</span>
                                </button>
                            </div>
                        </div>
                        <div id="front_preview" class="image-preview"></div>
                        <input type="file" id="front_image" name="front_image" accept="image/*" style="display: none;">
                        <p class="image-hint">封面</p>
                    </div>
                    
                    <!-- 封底拍攝 -->
                    <div class="image-upload-box">
                        <div class="camera-controls">
                            <button type="button" class="camera-btn" onclick="openCamera('back')">
                                <i class="fas fa-camera"></i>
                                <span>拍攝封底</span>
                            </button>
                        </div>
                        <div id="back_camera_container" class="camera-container" style="display: none;">
                            <div style="flex: 1; overflow: hidden; border-radius: 8px 8px 0 0;">
                                <video id="back_camera" autoplay playsinline style="width: 100%; height: 100%; object-fit: contain;"></video>
                            </div>
                            <canvas id="back_canvas" style="display: none;"></canvas>
                            <div class="camera-actions">
                                <button type="button" class="capture-btn" onclick="capturePhoto('back')">
                            <i class="fas fa-camera"></i>
                                    <span>拍照</span>
                                </button>
                                <button type="button" class="cancel-btn" onclick="closeCamera('back')">
                                    <i class="fas fa-times"></i>
                                    <span>取消</span>
                                </button>
                            </div>
                        </div>
                        <div id="back_preview" class="image-preview"></div>
                        <input type="file" id="back_image" name="back_image" accept="image/*" style="display: none;">
                        <p class="image-hint">封底</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 書籍評價區塊 -->
        <div class="form-section">
            <h3 class="section-title">請幫助我們填寫書籍評價</h3>
            
            <!-- 星級評分 -->
            <div class="form-group">
                <label>評分:</label>
                <div class="rating-stars">
                    <input type="radio" id="star5" name="rating" value="5" class="star-input">
                    <label for="star5" class="star-label"><i class="fas fa-star"></i></label>
                    <input type="radio" id="star4" name="rating" value="4" class="star-input" checked>
                    <label for="star4" class="star-label"><i class="fas fa-star"></i></label>
                    <input type="radio" id="star3" name="rating" value="3" class="star-input">
                    <label for="star3" class="star-label"><i class="fas fa-star"></i></label>
                    <input type="radio" id="star2" name="rating" value="2" class="star-input">
                    <label for="star2" class="star-label"><i class="fas fa-star"></i></label>
                    <input type="radio" id="star1" name="rating" value="1" class="star-input">
                    <label for="star1" class="star-label"><i class="fas fa-star"></i></label>
                </div>
            </div>
            
            <!-- 書籍類型選擇 -->
            <div class="form-group">
                <label for="book_type">書籍類型:</label>
                <select class="form-control" id="book_type" name="book_type" required onchange="toggleBookTypeFields()">
                    <option value="">請選擇書籍類型</option>
                    <option value="extracurricular">課外書</option>
                    <option value="course">課用書</option>
                </select>
            </div>
            
            <!-- 課用書相關欄位 -->
            <div id="courseBookFields" style="display: none;">
                <!-- 課程類型選擇 -->
                <div class="form-group">
                    <label for="course_type">課程類型:</label>
                    <select class="form-control" id="course_type" name="course_type" onchange="toggleCourseTypeFields()">
                        <option value="">請選擇課程類型</option>
                        <option value="general">通識課</option>
                        <option value="language">語文課</option>
                        <option value="department">系所課程</option>
                    </select>
                </div>
                
                <!-- 系所、科系、年級（僅系所課程需要） -->
                <div id="departmentFields" style="display: none;">
            <div class="form-group">
                <label for="department">系所:</label>
                        <select class="form-control" id="department" name="department" onchange="updateMajors()">
                    <option value="">請選擇系所</option>
                    <option value="工程學院">工程學院</option>
                    <option value="電資學院">電資學院</option>
                    <option value="管理學院">管理學院</option>
                    <option value="設計學院">設計學院</option>
                    <option value="人文社會學院">人文社會學院</option>
                    <option value="應用科技學院">應用科技學院</option>
                    <option value="產學創新學院">產學創新學院</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="major">科系:</label>
                        <select class="form-control" id="major" name="major">
                    <option value="">請先選擇系所</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="grade">年級:</label>
                        <select class="form-control" id="grade" name="grade">
                    <option value="">請選擇年級</option>
                    <option value="大一">大一</option>
                    <option value="大二">大二</option>
                    <option value="大三">大三</option>
                    <option value="大四">大四</option>
                    <option value="研究所">研究所</option>
                </select>
                    </div>
            </div>
            
                <!-- 課程名稱和授課老師（所有課用書都需要） -->
            <div class="form-group">
                <label for="course_name">課程名稱:</label>
                    <input type="text" class="form-control" id="course_name" name="course_name">
            </div>
            
            <div class="form-group">
                <label for="instructor">授課老師:</label>
                    <input type="text" class="form-control" id="instructor" name="instructor">
                </div>
            </div>
            
            <!-- 詳細內容（所有類型都需要） -->
            <div class="form-group">
                <label for="review_content">詳細內容:</label>
                <textarea class="form-control" id="review_content" name="review_content" rows="5" placeholder="請輸入詳細內容..." required></textarea>
            </div>
        </div>

        <!-- 提交按鈕 -->
        <div class="form-submit">
            <button type="submit" class="submit-btn">送出</button>
        </div>
    </form>
</div>

<script>
// 系所與科系對應資料

        "機械工程系",
        "材料科學與工程系",
        "營建工程系",
        "化學工程系",

        "先進科技全英語學士學位學程",
        "全球發展工程學士學位學程",
        "半導體高階經營暨研發碩士在職學位學程 (SEMI-EMRD)"
    ],
    "電資學院": [
        "電子工程系",
        "電機工程系",
        "資訊工程系",
        "光電工程研究所",
        "電資學士班",
        "資通科技國際學士學位學程"
    ],
    "管理學院": [
        "管理研究所",
        "工業管理系",
        "企業管理系",
        "財務金融研究所",
        "資訊管理系",
        "管理學院MBA",
        "EMBA碩士在職專班",
        "科技管理研究所",
        "管理學士班"
    ],
    "設計學院": [
        "設計系",
        "建築系"
    ],
    "人文社會學院": [
        "數位學習與教育研究所",
        "應用外語系",
        "人文社會學科",
        "師資培育中心"
    ],
    "應用科技學院": [
        "應用科技研究所",
        "醫學工程研究所",
        "專利研究所",
        "色彩與照明科技研究所",
        "不分系學士班",
        "應用科技學士學位學程",
        "智慧財產權學士學位學程",
        "色彩影像與照明科技學士學位學程"
    ],
    "產學創新學院": [
        "智慧製造科技研究所",
        "人工智慧跨域科技研究所",
        "能源永續科技研究所",
        "先進半導體科技研究所"
    ]
};

// 根據系所更新科系選項
function updateMajors() {
    const departmentSelect = document.getElementById('department');
    const majorSelect = document.getElementById('major');
    const selectedDepartment = departmentSelect.value;
    
    // 清空科系選項
    majorSelect.innerHTML = '<option value="">請選擇科系</option>';
    
    // 如果有選擇系所，載入對應的科系
    if (selectedDepartment && departmentMajors[selectedDepartment]) {
        const majors = departmentMajors[selectedDepartment];
        majors.forEach(function(major) {
            const option = document.createElement('option');
            option.value = major;
            option.textContent = major;
            majorSelect.appendChild(option);
        });
    } else {
        majorSelect.innerHTML = '<option value="">請先選擇系所</option>';
    }
}

// 星級評分功能
document.addEventListener('DOMContentLoaded', function() {
    const starInputs = document.querySelectorAll('.star-input');
    const starLabels = document.querySelectorAll('.star-label');
    const ratingStars = document.querySelector('.rating-stars');
    
    // 初始化星級評分（預設為4星）
    updateStars(4);
    
    starInputs.forEach((input, index) => {
        input.addEventListener('change', function() {
            const rating = parseInt(this.value);
            updateStars(rating);
        });
    });
    
    starLabels.forEach((label, index) => {
        label.addEventListener('mouseenter', function() {
            const rating = 5 - index;
            highlightStars(rating);
        });
    });
    
    if (ratingStars) {
        ratingStars.addEventListener('mouseleave', function() {
            const selectedInput = document.querySelector('.star-input:checked');
            if (selectedInput) {
                updateStars(parseInt(selectedInput.value));
            } else {
                updateStars(4); // 預設為4星
            }
        });
    }
});

function updateStars(rating) {
    const starLabels = document.querySelectorAll('.star-label');
    // 移除所有 highlight 類別
    starLabels.forEach(label => {
        label.classList.remove('highlight');
    });
    
    // 由於使用了 row-reverse，需要反向計算
    // rating 5 = 索引 0,1,2,3,4 都應該是 active
    // rating 4 = 索引 0,1,2,3 應該是 active
    starLabels.forEach((label, index) => {
        // 由於 row-reverse，索引0對應star5，索引4對應star1
        // 所以如果 rating >= (5 - index)，則應該顯示為 active
        if ((5 - index) <= rating) {
            label.classList.add('active');
        } else {
            label.classList.remove('active');
        }
    });
}

function highlightStars(rating) {
    const starLabels = document.querySelectorAll('.star-label');
    starLabels.forEach((label, index) => {
        if ((5 - index) <= rating) {
            label.classList.add('highlight');
        } else {
            label.classList.remove('highlight');
        }
    });
}

// 相機和條碼掃描功能
let frontStream = null;
let backStream = null;
let frontImageData = null;
let backImageData = null;
let cameraPermissionGranted = false;

// 檢查相機權限狀態
async function checkCameraPermission() {
    try {
        // 檢查瀏覽器是否支援 MediaDevices API
        // 在手機上，可能需要檢查多種方式
        const hasMediaDevices = navigator.mediaDevices && navigator.mediaDevices.getUserMedia;
        const hasGetUserMedia = navigator.getUserMedia || navigator.webkitGetUserMedia || navigator.mozGetUserMedia || navigator.msGetUserMedia;
        
        if (!hasMediaDevices && !hasGetUserMedia) {
            console.warn('瀏覽器不支援相機功能');
            // 檢查是否為 HTTPS 或 localhost
            const isSecure = location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
            if (!isSecure) {
                console.warn('相機功能需要 HTTPS 環境');
            }
            return false;
        }
        
        // 檢查權限狀態（如果瀏覽器支援 Permissions API）
        // 注意：手機瀏覽器可能不支援此 API
        if (navigator.permissions && navigator.permissions.query) {
            try {
                // 嘗試查詢相機權限
                const permissionStatus = await navigator.permissions.query({ name: 'camera' });
                console.log('權限狀態:', permissionStatus.state);
                return permissionStatus.state === 'granted';
            } catch (permError) {
                // 如果查詢失敗（手機瀏覽器常見），返回 null 表示未知狀態
                console.log('無法查詢權限狀態（可能不支援 Permissions API）:', permError);
                return null;
            }
        }
        
        // 如果不支援權限查詢 API（手機瀏覽器常見），返回 null（未知狀態）
        // 這樣會顯示權限提示，讓用戶主動授予權限
        return null;
    } catch (error) {
        console.error('檢查相機權限時發生錯誤:', error);
        // 發生錯誤時返回 null，讓用戶可以嘗試授予權限
        return null;
    }
}

// 顯示相機權限 Modal
function showCameraPermissionModal() {
    const modal = document.getElementById('cameraPermissionModal');
    if (modal) {
        modal.classList.add('show');
        document.body.style.overflow = 'hidden'; // 防止背景滾動
    }
}

// 關閉相機權限 Modal
function closeCameraPermissionModal() {
    const modal = document.getElementById('cameraPermissionModal');
    if (modal) {
        modal.classList.remove('show');
        document.body.style.overflow = ''; // 恢復滾動
    }
}

// 請求相機權限（提前請求）
async function requestCameraPermission() {
    const modal = document.getElementById('cameraPermissionModal');
    const permissionBtn = modal ? modal.querySelector('.confirm-btn[onclick="requestCameraPermission()"]') : null;
    
    try {
        // 顯示載入狀態
        if (permissionBtn) {
            permissionBtn.disabled = true;
            permissionBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 請求中...';
        }
        
        // 檢查瀏覽器是否支援
        // 支援多種方式以兼容不同瀏覽器
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            // 檢查是否為 HTTPS（手機瀏覽器通常需要 HTTPS）
            const isSecure = location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
            if (!isSecure) {
                throw new Error('相機功能需要 HTTPS 環境。請使用 HTTPS 訪問網站，或使用 ngrok 等工具建立 HTTPS 隧道。');
            }
            throw new Error('瀏覽器不支援相機功能。請確認使用最新版本的 Chrome、Safari 或 Firefox。');
        }
        
        // 請求相機權限
        // 在手機上，這會觸發瀏覽器的權限對話框
        let stream;
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: 'environment', // 後置相機
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            });
            
            // 立即關閉流（我們只是為了獲取權限，不實際使用相機）
            if (stream) {
                stream.getTracks().forEach(track => {
                    track.stop();
                });
            }
        } catch (mediaError) {
            // 如果標準方式失敗，嘗試使用更簡單的設定
            console.log('嘗試使用簡化設定請求相機權限...');
            stream = await navigator.mediaDevices.getUserMedia({
                video: true // 使用最簡單的設定
            });
            
            if (stream) {
                stream.getTracks().forEach(track => {
                    track.stop();
                });
            }
        }
        
        // 權限已授予
        cameraPermissionGranted = true;
        
        // 關閉 Modal
        closeCameraPermissionModal();
        
        // 顯示成功訊息
        showPermissionMessage('相機權限已授予！現在可以拍攝書籍照片了。', 'success');
        
        // 恢復按鈕（以防萬一）
        if (permissionBtn) {
            permissionBtn.disabled = false;
            permissionBtn.innerHTML = '<i class="fas fa-check"></i> 授予相機權限';
        }
        
    } catch (error) {
        console.error('請求相機權限失敗:', error);
        cameraPermissionGranted = false;
        
        let errorMessage = '無法獲取相機權限。';
        let showInstructions = false;
        
        if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
            errorMessage = '相機權限被拒絕。';
            showInstructions = true;
        } else if (error.name === 'NotFoundError' || error.name === 'DevicesNotFoundError') {
            errorMessage = '未找到可用的相機設備。請確認設備有相機功能。';
        } else if (error.name === 'NotReadableError' || error.name === 'TrackStartError') {
            errorMessage = '相機可能正被其他應用程式使用，請關閉其他使用相機的應用後重試。';
        } else if (error.name === 'OverconstrainedError' || error.name === 'ConstraintNotSatisfiedError') {
            errorMessage = '相機不支援請求的設定，將使用預設設定。';
            // 這種情況下，可以嘗試使用更簡單的設定
            cameraPermissionGranted = true; // 假設權限已授予，只是設定問題
        } else if (error.message && (error.message.includes('不支援') || error.message.includes('HTTPS'))) {
            if (error.message.includes('HTTPS')) {
                errorMessage = error.message;
            } else {
                // 檢查是否為 HTTPS 問題
                const isSecure = location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
                if (!isSecure) {
                    errorMessage = '相機功能需要 HTTPS 環境。\n\n請使用以下方式之一：\n1. 使用 ngrok 建立 HTTPS 隧道\n2. 部署到支援 HTTPS 的伺服器\n3. 在本地使用 localhost（僅限開發）';
                } else {
                    errorMessage = '您的瀏覽器可能不支援相機功能。\n\n請確認：\n1. 使用最新版本的 Chrome、Safari 或 Firefox\n2. 瀏覽器已更新到最新版本\n3. 設備有相機功能';
                }
            }
        } else {
            errorMessage = `無法獲取相機權限：${error.message || error.name || '未知錯誤'}`;
        }
        
        if (showInstructions) {
            // 檢測是否為手機
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (isMobile) {
                errorMessage += '\n\n請在瀏覽器設置中允許相機權限：\n';
                if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                    errorMessage += '設定 → Safari → 相機 → 允許';
                } else {
                    errorMessage += '設定 → 應用程式 → 瀏覽器 → 權限 → 相機 → 允許';
                }
            } else {
                errorMessage += '\n\n請在瀏覽器地址欄左側的鎖頭圖標中允許相機權限。';
            }
        }
        
        showPermissionMessage(errorMessage, 'error');
        
        // 恢復按鈕
        if (permissionBtn) {
            permissionBtn.disabled = false;
            permissionBtn.innerHTML = '<i class="fas fa-check"></i> 授予相機權限';
        }
    }
}

// 顯示權限訊息
function showPermissionMessage(message, type) {
    // 創建或更新訊息元素
    let messageDiv = document.getElementById('cameraPermissionMessage');
    if (!messageDiv) {
        messageDiv = document.createElement('div');
        messageDiv.id = 'cameraPermissionMessage';
        messageDiv.className = 'camera-permission-message';
        const uploadSection = document.querySelector('.image-upload-section');
        if (uploadSection) {
            uploadSection.insertBefore(messageDiv, uploadSection.firstChild);
        }
    }
    
    messageDiv.className = `camera-permission-message ${type}`;
    messageDiv.innerHTML = `
        <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
        <span>${message}</span>
        <button type="button" class="message-close" onclick="this.parentElement.remove()">
            <i class="fas fa-times"></i>
        </button>
    `;
    
    // 3 秒後自動隱藏成功訊息
    if (type === 'success') {
        setTimeout(() => {
            if (messageDiv && messageDiv.parentElement) {
                messageDiv.remove();
            }
        }, 3000);
    }
}

// 頁面載入時檢查相機權限
document.addEventListener('DOMContentLoaded', async function() {
    const modal = document.getElementById('cameraPermissionModal');
    
    // 檢查是否為手機設備
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    
    try {
        const permissionStatus = await checkCameraPermission();
        
        if (permissionStatus === false) {
            // 權限被拒絕或未授予，顯示 Modal
            showCameraPermissionModal();
        } else if (permissionStatus === true) {
            // 權限已授予
            cameraPermissionGranted = true;
            closeCameraPermissionModal();
        } else if (permissionStatus === null) {
            // 無法確定狀態（手機瀏覽器常見）
            // 在手機上，通常需要用戶主動授予權限，所以顯示 Modal
            if (isMobile) {
                showCameraPermissionModal();
            } else {
                // 在桌面瀏覽器上，如果無法確定狀態，也顯示 Modal 讓用戶可以提前授予
                showCameraPermissionModal();
            }
        }
    } catch (error) {
        console.error('檢查權限時發生錯誤:', error);
        // 發生錯誤時，顯示 Modal 讓用戶可以嘗試授予權限
        showCameraPermissionModal();
    }
    
    // 點擊 Modal 背景關閉
    if (modal) {
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                closeCameraPermissionModal();
            }
        });
    }
    
    // ESC 鍵關閉 Modal
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && modal && modal.classList.contains('show')) {
            closeCameraPermissionModal();
        }
    });
});

// 開啟相機
async function openCamera(type) {
    try {
        const video = document.getElementById(`${type}_camera`);
        const container = document.getElementById(`${type}_camera_container`);
        // 找到對應的相機控制區域
        const imageUploadBox = container.closest('.image-upload-box');
        const cameraControls = imageUploadBox ? imageUploadBox.querySelector('.camera-controls') : null;
        const cameraBtn = cameraControls ? cameraControls.querySelector('.camera-btn') : null;
        
        // 請求相機權限並開啟相機
        // 如果已經有權限，直接使用；如果沒有，這裡會觸發權限請求
        let stream;
        
        // 檢查是否支援相機功能（更寬鬆的檢查）
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            // 檢查是否為 HTTPS（手機瀏覽器通常需要 HTTPS）
            const isSecure = location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
            if (!isSecure) {
                alert('相機功能需要 HTTPS 環境。\n\n請使用 ngrok 建立 HTTPS 隧道：\n1. 下載 ngrok\n2. 運行: ngrok http 5000\n3. 使用 ngrok 提供的 HTTPS URL 訪問');
                return;
            } else {
                alert('瀏覽器可能不支援相機功能。\n\n請確認：\n1. 使用最新版本的 Chrome、Safari 或 Firefox\n2. 瀏覽器已更新到最新版本');
                return;
            }
        }
        
        try {
            // 先嘗試使用後置相機
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment', // 使用後置相機
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });
            } catch (constraintError) {
                // 如果後置相機不可用，嘗試使用預設相機
                console.log('後置相機不可用，嘗試使用預設相機...', constraintError);
                stream = await navigator.mediaDevices.getUserMedia({
                    video: true // 使用最簡單的設定
                });
            }
            
            // 權限已授予
            cameraPermissionGranted = true;
            
            // 隱藏權限提示
            closeCameraPermissionModal();
        } catch (permError) {
            console.error('無法獲取相機權限:', permError);
            
            // 顯示詳細的錯誤訊息
            let errorMsg = '無法使用相機。';
            if (permError.name === 'NotAllowedError' || permError.name === 'PermissionDeniedError') {
                const isMobile = /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent);
                if (isMobile) {
                    errorMsg = '相機權限被拒絕。\n\n請在瀏覽器設置中允許相機權限，然後重新整理頁面。';
                } else {
                    errorMsg = '相機權限被拒絕。\n\n請在瀏覽器地址欄左側的鎖頭圖標中允許相機權限。';
                }
            } else if (permError.name === 'NotFoundError') {
                errorMsg = '未找到可用的相機設備。';
            } else if (permError.name === 'NotReadableError') {
                errorMsg = '相機可能正被其他應用程式使用。';
            } else if (permError.message && permError.message.includes('HTTPS')) {
                errorMsg = permError.message + '\n\n請使用 ngrok 或其他工具建立 HTTPS 連接。';
            } else if (permError.message && permError.message.includes('不支援')) {
                const isSecure = location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
                if (!isSecure) {
                    errorMsg = '相機功能需要 HTTPS 環境。\n\n請使用 ngrok 建立 HTTPS 隧道，或部署到支援 HTTPS 的伺服器。';
                } else {
                    errorMsg = '瀏覽器可能不支援相機功能。\n\n請確認使用最新版本的 Chrome、Safari 或 Firefox。';
                }
            }
            
            alert(errorMsg);
            return;
        }
        
        if (type === 'front') {
            frontStream = stream;
        } else {
            backStream = stream;
        }
        
        video.srcObject = stream;
        container.style.display = 'block';
        if (cameraBtn) {
            cameraBtn.style.display = 'none';
        }
        
        // 如果是封面，顯示掃描 ISBN 按鈕
        if (type === 'front' && cameraControls) {
            const scanBtn = cameraControls.querySelector('.scan-isbn-btn');
            if (scanBtn) {
                scanBtn.style.display = 'inline-block';
            }
        }
    } catch (error) {
        console.error('無法開啟相機:', error);
        alert('無法開啟相機，請確認已授予相機權限');
    }
}

// 關閉相機
function closeCamera(type) {
    const video = document.getElementById(`${type}_camera`);
    const container = document.getElementById(`${type}_camera_container`);
    const cameraControls = container.previousElementSibling;
    const cameraBtn = cameraControls ? cameraControls.querySelector('.camera-btn') : null;
    
    let stream = type === 'front' ? frontStream : backStream;
    if (stream) {
        stream.getTracks().forEach(track => track.stop());
        if (type === 'front') {
            frontStream = null;
        } else {
            backStream = null;
        }
    }
    
    video.srcObject = null;
    container.style.display = 'none';
    if (cameraBtn) {
        cameraBtn.style.display = 'inline-block';
    }
    
    // 隱藏掃描按鈕
    if (type === 'front' && cameraControls) {
        const scanBtn = cameraControls.querySelector('.scan-isbn-btn');
        if (scanBtn) {
            scanBtn.style.display = 'none';
        }
    }
}

// 拍照
function capturePhoto(type) {
    const video = document.getElementById(`${type}_camera`);
    const canvas = document.getElementById(`${type}_canvas`);
    const preview = document.getElementById(`${type}_preview`);
    const fileInput = document.getElementById(`${type}_image`);
    
    // 設置 canvas 尺寸
    canvas.width = video.videoWidth;

    // 繪製當前畫面到 canvas
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
        // 轉換為 blob 並顯示預覽（壓縮圖片以節省流量）
        canvas.toBlob(function(blob) {
            // 進一步壓縮圖片
            compressAndSetImage(blob, type, preview, fileInput);

            closeCamera(type);
        }, 'image/jpeg', 0.9);
}

// 圖片壓縮功能（節省流量）
function compressAndSetImage(blob, type, preview, fileInput) {
    // 創建圖片對象來讀取尺寸
    const img = new Image();
    const url = URL.createObjectURL(blob);
    
    img.onload = function() {
        // 計算壓縮後的尺寸（最大 1200x1600，保持長寬比）
        const maxWidth = 1200;
        const maxHeight = 1600;
        let width = img.width;
        let height = img.height;
        
        // 計算縮放比例
        if (width > maxWidth || height > maxHeight) {
            const ratio = Math.min(maxWidth / width, maxHeight / height);
            width = Math.round(width * ratio);
            height = Math.round(height * ratio);
        }
        
        // 創建壓縮用的 canvas
        const compressCanvas = document.createElement('canvas');
        compressCanvas.width = width;
        compressCanvas.height = height;
        const compressCtx = compressCanvas.getContext('2d');
        
        // 繪製壓縮後的圖片
        compressCtx.drawImage(img, 0, 0, width, height);
        
        // 轉換為 blob（品質 0.85，平衡品質和檔案大小）
        compressCanvas.toBlob(function(compressedBlob) {
            const compressedUrl = URL.createObjectURL(compressedBlob);
            preview.innerHTML = `<img src="${compressedUrl}" alt="預覽圖" class="preview-img">`;
            
            // 創建 File 對象並設置到 file input
            const file = new File([compressedBlob], `${type}_image.jpg`, { type: 'image/jpeg' });
            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(file);
            fileInput.files = dataTransfer.files;
            
            // 儲存圖片數據
            if (type === 'front') {
                frontImageData = compressedUrl;
            } else {
                backImageData = compressedUrl;
            }
            
            // 釋放原始 URL
            URL.revokeObjectURL(url);
        }, 'image/jpeg', 0.85);
    };
    
    img.onerror = function() {
        // 如果壓縮失敗，使用原始 blob
        const imageUrl = URL.createObjectURL(blob);
        preview.innerHTML = `<img src="${imageUrl}" alt="預覽圖" class="preview-img">`;
        
        const file = new File([blob], `${type}_image.jpg`, { type: 'image/jpeg' });
        const dataTransfer = new DataTransfer();
        dataTransfer.items.add(file);
        fileInput.files = dataTransfer.files;
        
        if (type === 'front') {
            frontImageData = imageUrl;
        } else {
            backImageData = imageUrl;
        }
    };
    
    img.src = url;
}
