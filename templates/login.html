<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .form-container {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2 class="text-center mb-4">登入</h2>
    
    <form action="/login" method="post">
        <!-- Std_num Field -->
        <div class="form-container">
            <label for="std_num" class="form-label">臺科大學號</label>
            <input type="std_num" name="std_num" id="std_num" class="form-control" placeholder="學號" required>
        </div>

        <!-- Password Field -->
        <div class="form-container">
            <label for="password" class="form-label">密碼</label>
            <input type="password" name="password" id="password" class="form-control" placeholder="密碼" required>
        </div>

        <!-- Submit Button -->
        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary btn-block">登入</button>
        </div>
    </form>

    <!-- Registration Link -->
    <div class="text-center mt-3">
        <p>還沒有帳號？ <a href="/register">註冊</a></p>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="loginErrorModal" tabindex="-1" aria-labelledby="loginErrorModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="loginErrorModalLabel">登入失敗</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p>學號或密碼錯誤，請確認後再試。</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="noEmailErrorModal" tabindex="-1" aria-labelledby="noEmailErrorModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="noEmailErrorModalLabel">登入失敗</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p>您未進行學校電子信箱驗證，請前往確認後再次嘗試。</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
        </div>
      </div>
    </div>
  </div>

<!-- Bootstrap JS (Optional) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // 若登入失敗，彈出 Modal
    {% if error %}
        var errorModal = new bootstrap.Modal(document.getElementById('loginErrorModal'));
        errorModal.show();
    {% endif %}

    {% if no_email %}
    var errorModal = new bootstrap.Modal(document.getElementById('noEmailErrorModal'));
    errorModal.show();
    {% endif %}
</script>

</body>
</html>
